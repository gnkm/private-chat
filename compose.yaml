# 本番: podman compose up --build -d / podman compose up -d / podman compose down
# 開発: compose.dev.yaml を参照

services:
  private-chat:
    build:
      context: .
      dockerfile: Containerfile
    image: private-chat:latest
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
